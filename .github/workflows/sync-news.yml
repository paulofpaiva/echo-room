# Invokes the Supabase Edge Function sync-news every 6 hours to refresh the news table.
# Uses 4 requests/day to NewsAPI, well under the free tier limit (100/day).
#
# Required GitHub repo secrets:
#   SUPABASE_SYNC_NEWS_URL: full URL, e.g. https://YOUR_PROJECT_REF.supabase.co/functions/v1/sync-news
#   SUPABASE_ANON_KEY: your Supabase anon/public key (Project → Settings → API)
name: Sync news

on:
  schedule:
    # Every 6 hours (00:00, 06:00, 12:00, 18:00 UTC)
    - cron: "0 */6 * * *"
  workflow_dispatch: # Allow manual run from Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Invoke sync-news
        run: |
          if [ -z "${{ secrets.SUPABASE_SYNC_NEWS_URL }}" ] || [ -z "${{ secrets.SUPABASE_ANON_KEY }}" ]; then
            echo "Skipping: SUPABASE_SYNC_NEWS_URL and SUPABASE_ANON_KEY must be set in repo secrets."
            exit 0
          fi
          res=$(curl -s -w "\n%{http_code}" -X POST \
            "${{ secrets.SUPABASE_SYNC_NEWS_URL }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Content-Type: application/json")
          code=$(echo "$res" | tail -n1)
          body=$(echo "$res" | sed '$d')
          echo "Response ($code): $body"
          if [ "$code" -ge 400 ]; then
            exit 1
          fi
