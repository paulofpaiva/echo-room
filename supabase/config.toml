# Supabase local config. See: https://supabase.com/docs/guides/cli/config
project_id = "echo-room"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[db.migrations]
enabled = true
schema_paths = []

[db.seed]
enabled = true
sql_paths = ["./seed.sql", "./seed_posts.sql", "./seed_comments.sql", "./seed_ptbr.sql"]

[studio]
enabled = true
port = 54323

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://127.0.0.1:5173"
additional_redirect_urls = ["http://127.0.0.1:5173"]

[edge_runtime]
enabled = true
policy = "per_worker"
deno_version = 2
